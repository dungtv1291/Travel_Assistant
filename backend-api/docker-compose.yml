version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: travel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_assistant
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travel_user -d travel_assistant']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travel_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: travel_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: travel_assistant
      DB_USER: travel_user
      DB_PASSWORD: travel_pass
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      JWT_ACCESS_SECRET: dev_access_secret_change_in_production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      JWT_REFRESH_EXPIRES_IN: 30d
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:
